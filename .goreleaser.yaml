# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: repoaudit

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

brews:
  - name: repoaudit
    repository:
      owner: vosiander
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/vosiander/repo-audit"
    description: "Automated security audit for Git repositories"
    license: "MIT"
    test: |
      system "#{bin}/repoaudit", "--help"
    install: |
      bin.install "repoaudit"
